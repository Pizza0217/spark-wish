<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark - 愿望交换商店</title>
    <style>
        /* 全局样式与美化 */
        :root {
            --primary-color: #6c5ce7;
            --accent-color: #fd79a8;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            min-height: 100vh;
            color: #333;
        }
        /* 头部样式 */
        header {
            text-align: center;
            padding: 60px 20px 40px;
            color: white;
        }
        header h1 {
            font-size: 3rem;
            margin: 0;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            font-weight: 800;
            letter-spacing: 2px;
        }
        header p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-top: 10px;
        }
        /* 容器 */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px 100px;
        }
        /* 卡片列表样式 */
        .wish-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .wish-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .wish-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }
        .wish-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 12px;
            color: #2d3436;
        }
        .wish-reward-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 4px;
        }
        .wish-reward {
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #636e72;
            margin-bottom: 15px;
            display: inline-block;
        }
        .btn-helper {
            display: inline-block;
            padding: 8px 20px;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-helper:hover {
            background: #5a4ec4;
        }
        /* 悬浮添加按钮 */
        .fab-button {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 65px;
            height: 65px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: var(--primary-color);
            transition: transform 0.2s, background 0.2s;
            z-index: 100;
        }
        .fab-button:hover {
            transform: scale(1.1) rotate(90deg);
            background: var(--primary-color);
            color: white;
        }
        /* 弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-content h2 {
            margin-top: 0;
            color: var(--primary-color);
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #ccc;
            font-weight: bold;
        }
        .close-btn:hover { color: #333; }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        .form-input, .form-textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .form-input:focus, .form-textarea:focus {
            border-color: var(--primary-color);
            outline: none;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .submit-btn:hover {
            background: #e84393;
        }
        /* 提示条 */
        .notice {
            text-align: center;
            color: white;
            margin-top: 50px;
            opacity: 0.7;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<header>
    <h1>Spark</h1>
    <p>愿望交换商店 · 点亮你的心愿</p>
</header>
<div class="container">
    <!-- 愿望展示区 -->
    <div class="wish-list" id="wish-list">
        <!-- 初始加载占位 -->
        <div class="wish-card">
            <div class="wish-title" style="color:#ccc;">正在收集星光...</div>
        </div>
    </div>
    <div class="notice">点击右下角 "+" 许下你的愿望</div>
</div>
<!-- 悬浮添加按钮 -->
<div class="fab-button" onclick="openModal()">+</div>
<!-- 弹窗模态框 -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2>✨ 许下新愿望</h2>
        <div class="form-group">
            <label>您的愿望：</label>
            <input type="text" id="wishTitle" class="form-input" placeholder="例如：想求一本绝版书">
        </div>
        <div class="form-group">
            <label>提供的回报：</label>
            <textarea id="wishReward" class="form-textarea" rows="3" placeholder="例如：可以交换编程教学/一杯咖啡/真诚的感谢"></textarea>
        </div>
        <button class="submit-btn" onclick="submitWish()">发布愿望</button>
    </div>
</div>
<script>
    // ⚠️ 必填：请修改为您的 GitHub 用户名和仓库名
    const REPO_OWNER = 'Pizza0217'; // 根据截图自动识别
    const REPO_NAME = 'spark-wish'; // 根据截图自动识别
    const REPO_PATH = `${REPO_OWNER}/${REPO_NAME}`;
    // 1. 加载愿望列表
    async function loadWishes() {
        const listContainer = document.getElementById('wish-list');
        try {
            const response = await fetch(`https://api.github.com/repos/${REPO_PATH}/issues?state=open&per_page=20`);
            if (!response.ok) throw new Error('API Error');
            const wishes = await response.json();
            if (wishes.length === 0) {
                listContainer.innerHTML = `
                    <div class="wish-card" style="grid-column: 1 / -1; text-align: center;">
                        <div class="wish-title">商店空空如也</div>
                        <p style="color:#888">成为第一个许愿的人吧！</p>
                    </div>`;
                return;
            }
            listContainer.innerHTML = '';
            wishes.forEach(wish => {
                const card = document.createElement('div');
                card.className = 'wish-card';
                card.innerHTML = `
                    <div class="wish-title">${escapeHtml(wish.title)}</div>
                    <div class="wish-reward-label">💰 回报：</div>
                    <div class="wish-reward">${escapeHtml(wish.body ? (wish.body.length > 30 ? wish.body.substring(0,30)+'...' : wish.body) : '无')}</div>
                    <br>
                    <a href="${wish.html_url}" target="_blank" class="btn-helper">我要帮助TA</a>
                `;
                listContainer.appendChild(card);
            });
        } catch (error) {
            listContainer.innerHTML = `<div class="wish-card" style="grid-column: 1 / -1; text-align: center; color:red;">
                数据加载失败。请确认仓库 ${REPO_PATH} 是公开的，且用户名正确。
            </div>`;
        }
    }
    // 2. 弹窗控制
    function openModal() {
        document.getElementById('modalOverlay').style.display = 'flex';
    }
    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
    }
    // 3. 提交逻辑
    function submitWish() {
        const title = document.getElementById('wishTitle').value;
        const reward = document.getElementById('wishReward').value;
        if (!title) {
            alert('请填写愿望内容');
            return;
        }
        // 构造 GitHub Issue 预填链接
        // 用户点击后跳转到该链接，GitHub 会自动填好内容，用户只需点 Submit
        const issueUrl = `https://github.com/${REPO_PATH}/issues/new?title=${encodeURIComponent(title)}&body=${encodeURIComponent(reward)}`;
        window.open(issueUrl, '_blank');
        closeModal();
        alert('页面已跳转，请在 GitHub 页面点击 "Submit new issue" 完成发布。');
    }
    // 防XSS注入
    function escapeHtml(text) {
        if (!text) return text;
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
    // 页面加载时执行
    loadWishes();
</script>
</body>
</html>
